# Receipts — Slack app manifest (COMPREHENSIVE scopes for autonomous demo staging).
# Apply via the app's "App Manifest" page (JSON tab), then reinstall.

display_information:
  name: Receipts
  description: Ends arguments with the actual prior decision - verbatim quote + live permalink.
  background_color: "#2eb67d"

features:
  bot_user:
    display_name: Receipts
    always_online: true

oauth_config:
  scopes:
    bot:
      # messaging
      - app_mentions:read
      - chat:write
      - chat:write.public
      - chat:write.customize
      - commands
      # channels (public) — full management
      - channels:read
      - channels:history
      - channels:join
      - channels:manage
      - channels:write.topic
      - channels:write.invites
      # channels (private)
      - groups:read
      - groups:history
      - groups:write
      - groups:write.topic
      - groups:write.invites
      # DMs / group DMs
      - im:read
      - im:history
      - im:write
      - mpim:read
      - mpim:history
      - mpim:write
      # reactions / pins / bookmarks / canvases / files
      - reactions:read
      - reactions:write
      - pins:read
      - pins:write
      - bookmarks:read
      - bookmarks:write
      - canvases:read
      - canvases:write
      - files:read
      - files:write
      # people / metadata
      - users:read
      - users:read.email
      - users.profile:read
      - usergroups:read
      - usergroups:write
      - team:read
      - emoji:read
      - assistant:write
    user:
      # RTS engine (the product)
      - search:read.public
      - search:read.private
      # act as the summoner / stage the demo as a real user
      - chat:write
      - channels:read
      - channels:write
      - channels:history
      - groups:read
      - groups:write
      - groups:history
      - reactions:write
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
